<script>

// ====== АККАУНТЫ ======

let users = JSON.parse(localStorage.getItem("users")) || {};
let currentUser = localStorage.getItem("currentUser") || null;

function saveUsers(){
    localStorage.setItem("users", JSON.stringify(users));
    localStorage.setItem("currentUser", currentUser);
}

function register(){
    let nick = prompt("Придумай ник:");
    if(!nick) return;

    if(users[nick]){
        alert("Такой ник уже существует");
        return;
    }

    let pass = prompt("Придумай пароль:");
    if(!pass) return;

    users[nick] = {
        password: pass,
        balance: 200000,
        myNFTs: []
    };

    currentUser = nick;
    saveUsers();
    alert("Аккаунт создан!");
    location.reload();
}

function login(){
    let nick = prompt("Ник:");
    if(!users[nick]){
        alert("Аккаунт не найден");
        return;
    }

    let pass = prompt("Пароль:");
    if(users[nick].password !== pass){
        alert("Неверный пароль");
        return;
    }

    currentUser = nick;
    saveUsers();
    location.reload();
}

function logout(){
    currentUser = null;
    localStorage.removeItem("currentUser");
    location.reload();
}

function switchAccount(){
    let keys = Object.keys(users);
    if(keys.length === 0){
        alert("Нет аккаунтов");
        return;
    }

    let list = "Выбери аккаунт:\n";
    keys.forEach((u,i)=> list += i + ": " + u + "\n");

    let index = prompt(list);
    if(keys[index]){
        currentUser = keys[index];
        saveUsers();
        location.reload();
    }
}

// ====== ПРОВЕРКА ВХОДА ======

if(!currentUser){
    setTimeout(()=>{
        if(Object.keys(users).length === 0){
            register();
        } else {
            login();
        }
    },300);
}

// ====== ДАННЫЕ ======

let marketNFTs = JSON.parse(localStorage.getItem("marketNFTs")) || [
{id:1,name:"Purple Dragon",price:50000,img:"https://picsum.photos/300?1"},
{id:2,name:"Cyber Cat",price:30000,img:"https://picsum.photos/300?2"}
];

let balance = users[currentUser]?.balance || 200000;
let myNFTs = users[currentUser]?.myNFTs || [];
let currentChat=null;

function saveData(){
    users[currentUser].balance = balance;
    users[currentUser].myNFTs = myNFTs;
    localStorage.setItem("marketNFTs", JSON.stringify(marketNFTs));
    saveUsers();
}

function openChat(name){
currentChat=name;
document.getElementById("chatName").innerText=name;
document.getElementById("messages").innerHTML="";
}

function sendMessage(){
if(!currentChat)return;
let input=document.getElementById("msgInput");
if(!input.value)return;
let msg=document.createElement("div");
msg.className="message me";
msg.innerText=input.value;
document.getElementById("messages").appendChild(msg);
input.value="";
}

function openProfile(){
document.getElementById("profilePanel").style.display="flex";
document.getElementById("balanceText").innerText="Аккаунт: "+currentUser+" | Баланс: $"+balance;
}

function openSettings(){
document.getElementById("settingsPanel").style.display="flex";

let container=document.getElementById("marketList");
container.innerHTML = `
<h4>Аккаунты</h4>
<button class="small-btn" onclick="register()">➕ Создать</button>
<button class="small-btn" onclick="login()">🔑 Войти</button>
<button class="small-btn" onclick="switchAccount()">🔄 Сменить</button>
<button class="small-btn" onclick="logout()">🚪 Выйти</button>
`;
}

function closePanels(){
document.getElementById("profilePanel").style.display="none";
document.getElementById("settingsPanel").style.display="none";
}

function searchUser(){
let input=document.getElementById("searchInput").value.toLowerCase();
let chats=document.querySelectorAll(".chat-item");
chats.forEach(chat=>{
let name=chat.getAttribute("data-name").toLowerCase();
chat.style.display=name.includes(input)?"flex":"none";
});
}

</script>
